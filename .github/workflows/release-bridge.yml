# Release Bridge workflow — builds, signs, and notarizes bear-bridge + bear-xcall.app
#
# Required GitHub Secrets:
#   APPLE_CERTIFICATE          — Base64-encoded Developer ID Application .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD — Password for the .p12 certificate
#   APPLE_TEAM_ID              — Apple Developer Team ID (e.g., "XXXXXXXXXX")
#   APPLE_ID                   — Apple ID email for notarytool authentication
#   APPLE_ID_PASSWORD          — App-specific password for notarytool (generate at appleid.apple.com)
#
# Setup checklist:
#   1. Export Developer ID Application certificate as .p12 from Keychain Access
#   2. Base64-encode it: base64 -i cert.p12 | pbcopy
#   3. Create an app-specific password at https://appleid.apple.com/account/manage
#   4. Add all five secrets in GitHub repo → Settings → Secrets and variables → Actions

name: Release Bridge

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goarch: arm64
            arch_name: arm64
            swift_extra_flags: ""
          - goarch: amd64
            arch_name: amd64
            swift_extra_flags: "-target x86_64-apple-macosx10.15"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build bridge binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" -o bin/bear-bridge ./cmd/bridge

      - name: Build bear-xcall.app
        run: |
          mkdir -p bin/bear-xcall.app/Contents/MacOS
          # shellcheck disable=SC2086
          swiftc ${{ matrix.swift_extra_flags }} -o bin/bear-xcall.app/Contents/MacOS/bear-xcall tools/bear-xcall/main.swift
          cp tools/bear-xcall/Info.plist bin/bear-xcall.app/Contents/

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list (word splitting intentional)
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

          # Extract signing identity from imported certificate
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "Found signing identity: $IDENTITY"
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign bear-bridge binary
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --options runtime \
            --timestamp \
            bin/bear-bridge

      - name: Sign bear-xcall.app
        run: |
          codesign --force --deep --sign "$CODESIGN_IDENTITY" \
            --entitlements tools/bear-xcall/entitlements.plist \
            --options runtime \
            --timestamp \
            bin/bear-xcall.app

      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip containing both signed artifacts for notarization
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"
          mkdir -p "$RUNNER_TEMP/notarize-payload"
          cp bin/bear-bridge "$RUNNER_TEMP/notarize-payload/"
          cp -R bin/bear-xcall.app "$RUNNER_TEMP/notarize-payload/"
          ditto -c -k "$RUNNER_TEMP/notarize-payload" "$NOTARIZE_ZIP"

          # Submit for notarization and wait
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          # Stapling only works on .app bundles and disk images, not standalone binaries
          xcrun stapler staple bin/bear-xcall.app

      - name: Verify signatures
        run: |
          echo "Verifying bear-bridge signature..."
          codesign --verify --deep --strict --verbose=2 bin/bear-bridge

          echo "Verifying bear-xcall.app signature..."
          codesign --verify --deep --strict --verbose=2 bin/bear-xcall.app

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="bear-bridge-${VERSION}-darwin-${{ matrix.arch_name }}.tar.gz"
          ARCHIVE_DIR="bear-bridge-${VERSION}-darwin-${{ matrix.arch_name }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp bin/bear-bridge "${ARCHIVE_DIR}/"
          cp -R bin/bear-xcall.app "${ARCHIVE_DIR}/"
          cp deploy/com.romancha.bear-bridge.plist "${ARCHIVE_DIR}/"
          cp deploy/bear-bridge-wrapper.sh "${ARCHIVE_DIR}/"
          cp deploy/.env.bridge.example "${ARCHIVE_DIR}/"
          cp tools/bear-xcall/entitlements.plist "${ARCHIVE_DIR}/"
          cp Makefile "${ARCHIVE_DIR}/"
          tar -czf "${ARCHIVE_NAME}" "${ARCHIVE_DIR}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          cat "${ARCHIVE_NAME}.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: bridge-darwin-${{ matrix.arch_name }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          retention-days: 5

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release assets
        run: ls -la bear-bridge-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            bear-bridge-*.tar.gz
            bear-bridge-*.sha256
