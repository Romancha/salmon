# Release Bridge workflow — builds, signs, and notarizes bear-bridge + bear-xcall.app + BearBridge.app
#
# Required GitHub Secrets:
#   APPLE_CERTIFICATE          — Base64-encoded Developer ID Application .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD — Password for the .p12 certificate
#   APPLE_TEAM_ID              — Apple Developer Team ID (e.g., "XXXXXXXXXX")
#   APPLE_ID                   — Apple ID email for notarytool authentication
#   APPLE_ID_PASSWORD          — App-specific password for notarytool (generate at appleid.apple.com)
#
# Setup checklist:
#   1. Export Developer ID Application certificate as .p12 from Keychain Access
#   2. Base64-encode it: base64 -i cert.p12 | pbcopy
#   3. Create an app-specific password at https://appleid.apple.com/account/manage
#   4. Add all five secrets in GitHub repo → Settings → Secrets and variables → Actions

name: Release Bridge

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goarch: arm64
            arch_name: arm64
            swift_extra_flags: "-target arm64-apple-macosx11.0"
            swift_arch: arm64
          - goarch: amd64
            arch_name: amd64
            swift_extra_flags: "-target x86_64-apple-macosx10.15"
            swift_arch: x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build bridge binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: go build -ldflags "-X main.version=$BUILD_VERSION" -o bin/bear-bridge ./cmd/bridge

      - name: Build bear-xcall.app
        run: |
          mkdir -p bin/bear-xcall.app/Contents/MacOS
          # shellcheck disable=SC2086
          swiftc ${{ matrix.swift_extra_flags }} -o bin/bear-xcall.app/Contents/MacOS/bear-xcall tools/bear-xcall/main.swift
          cp tools/bear-xcall/Info.plist bin/bear-xcall.app/Contents/

      - name: Build BearBridge.app
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Inject version into Info.plist
          APP_VERSION="${VERSION#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_VERSION" tools/bear-bridge-app/BearBridge/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" tools/bear-bridge-app/BearBridge/Info.plist

          # Build Swift app for target architecture
          xcodebuild -project tools/bear-bridge-app/BearBridge.xcodeproj \
            -scheme BearBridge -configuration Release \
            ARCHS=${{ matrix.swift_arch }} \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR="$PWD/bin/xcodebuild-out" \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list (word splitting intentional)
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

          # Extract signing identity from imported certificate
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "Found signing identity: $IDENTITY"
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign bear-bridge binary
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --options runtime \
            --timestamp \
            bin/bear-bridge

      - name: Sign bear-xcall.app
        run: |
          codesign --force --deep --sign "$CODESIGN_IDENTITY" \
            --entitlements tools/bear-xcall/entitlements.plist \
            --options runtime \
            --timestamp \
            bin/bear-xcall.app

      - name: Assemble and sign BearBridge.app
        run: |
          # Assemble .app bundle from xcodebuild output
          mkdir -p bin/BearBridge.app/Contents/MacOS
          cp -R bin/xcodebuild-out/BearBridge.app/ bin/BearBridge.app/
          rm -rf bin/xcodebuild-out

          # Embed signed binaries
          cp bin/bear-bridge bin/BearBridge.app/Contents/MacOS/
          cp -R bin/bear-xcall.app bin/BearBridge.app/Contents/MacOS/

          # Sign the outer app (embedded items already signed individually)
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --options runtime \
            --timestamp \
            bin/BearBridge.app

      - name: Create .dmg disk image
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH_NAME: ${{ matrix.arch_name }}
        run: |
          DMG_NAME="BearBridge-${VERSION}-${ARCH_NAME}.dmg"
          chmod +x tools/create-dmg.sh
          ./tools/create-dmg.sh bin/BearBridge.app "$DMG_NAME"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Sign .dmg
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --timestamp \
            "$DMG_NAME"

      - name: Notarize .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$DMG_NAME"

      - name: Verify signatures
        run: |
          echo "Verifying .dmg signature..."
          codesign --verify --verbose=2 "$DMG_NAME"

          echo "Verifying BearBridge.app signature (inside .dmg build)..."
          codesign --verify --deep --strict --verbose=2 bin/BearBridge.app

      - name: Generate SHA256 checksum
        run: |
          shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
          cat "${DMG_NAME}.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: bridge-darwin-${{ matrix.arch_name }}
          path: |
            ${{ env.DMG_NAME }}
            ${{ env.DMG_NAME }}.sha256
          retention-days: 5

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List release assets
        run: ls -la BearBridge-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            BearBridge-*.dmg
            BearBridge-*.sha256
